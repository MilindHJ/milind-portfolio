<!DOCTYPE html>
<html lang="en">
<head>

    <title>Milind Store</title>
    <!-- Link to separate CSS -->
    <link rel="stylesheet" href="app.css">
</head>
<body>

        <h2>Milind Store</h2>

            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400" alt="Mobile">

            <p>₹15000</p>
            <button>Add to Cart</button>
        </div>
